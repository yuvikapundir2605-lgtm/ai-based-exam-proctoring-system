<!DOCTYPE html>
<html>
<head>
    <title>AI Proctoring System</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            text-align: center;
        }

        h1 {
            background: #007bff;
            color: white;
            padding: 15px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        video {
            margin-top: 20px;
            border: 4px solid #333;
            border-radius: 10px;
        }

        #status {
            font-size: 22px;
            margin-top: 15px;
            font-weight: bold;
        }

        #timer {
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>AI Exam Proctoring System</h1>

<button onclick="startExam()">▶ Start Exam</button>

<div id="timer">Time: 00:00</div>

<video id="video" width="600" autoplay playsinline></video>

<canvas id="canvas" style="display:none;"></canvas>

<h2 id="status">Waiting to start...</h2>

<script>
let seconds = 0;
let examDuration = 120;
let timerInterval;
let statusInterval;
let frameInterval;
let stream;

const video = document.getElementById("video");

function startExam() {

    seconds = 0;

    navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
        stream = s;
        video.srcObject = stream;

       
        let track = stream.getVideoTracks()[0];
        track.onended = function () {
            alert("⚠ Camera turned off!");
            fetch(window.location.origin + "/camera_off");
        };
    })
    .catch(err => {
        alert("⚠ Camera access denied!");
        fetch(window.location.origin + "/camera_off");
    });

    document.getElementById("status").innerText = "Starting...";

    // Timer
    timerInterval = setInterval(() => {
        seconds++;

        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;

        document.getElementById("timer").innerText =
            "Time: " + String(mins).padStart(2, '0') + ":" + String(secs).padStart(2, '0');

        if (seconds >= examDuration) {
            stopExam();
        }
    }, 1000);

   
    frameInterval = setInterval(sendFrame, 1000);

    
    if (!statusInterval) {
        statusInterval = setInterval(fetchStatus, 1000);
    }
}

function stopExam() {
    clearInterval(timerInterval);
    clearInterval(statusInterval);
    clearInterval(frameInterval);

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    document.getElementById("status").innerText = "⛔ Exam Finished";
}

function sendFrame() {
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    if (!video.videoWidth) return; // fix crash before video loads

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let imageData = canvas.toDataURL("image/jpeg");

    fetch(window.location.origin + "/detect", {
        method: "POST",
        body: JSON.stringify({ image: imageData }),
        headers: {
            "Content-Type": "application/json"
        }
    });
}

function fetchStatus() {
    fetch(window.location.origin + "/status")
        .then(res => res.text())
        .then(data => {
            let s = document.getElementById("status");

            if (data.includes("No Face")) {
                s.innerText = "⚠ No Face Detected";
                s.style.color = "orange";
            } 
            else if (data.includes("Multiple")) {
                s.innerText = "🚨 Multiple Faces Detected";
                s.style.color = "red";
            } 
            else {
                s.innerText = "✅ All Good";
                s.style.color = "green";
            }
        });
}


document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
        alert("⚠ Tab switched! This is not allowed.");
        fetch(window.location.origin + "/tab_switch");
    }
});
</script>

</body>
</html>
